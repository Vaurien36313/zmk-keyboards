# =============================================================================
	# OPTIMIZED ZMK CONFIGURATION FOR SPLIT BLE KEYBOARD
	# Fixes: disconnects, key staggers, stuck keys, delays, low performance
	# =============================================================================

	# -----------------------------------------------------------------------------
	# CRITICAL: DISABLE SLEEP (Causes most disconnect issues)
	# -----------------------------------------------------------------------------
CONFIG_ZMK_SLEEP=n
	# If you MUST have sleep for battery life, use these instead:
	# CONFIG_ZMK_SLEEP=y
	# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000  # 30 minutes

	# -----------------------------------------------------------------------------
	# BLE TRANSMIT POWER (Boost signal strength)
	# -----------------------------------------------------------------------------
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
	# Alternative options if +8 causes issues:
	# CONFIG_BT_CTLR_TX_PWR_PLUS_4=y
	# CONFIG_BT_CTLR_TX_PWR_0=y

	# -----------------------------------------------------------------------------
	# BLE CONNECTION INTERVALS (Faster polling for lower latency)
	# -----------------------------------------------------------------------------
	# Peripheral connection preferences (keyboard to computer)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

	# Central connection parameters (for split communication)
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=5

	# -----------------------------------------------------------------------------
	# SPLIT KEYBOARD BUFFER SIZES (Prevents key staggers & stuck keys)
	# -----------------------------------------------------------------------------
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=20
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=2048
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_QUEUE_SIZE=20

	# Peripheral side buffers
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=2048
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_PRIORITY=5

	# -----------------------------------------------------------------------------
	# BLE CONTROLLER SETTINGS (Stability improvements)
	# -----------------------------------------------------------------------------
	# Disable strict GATT subscription (compatibility)
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

	# Increase BLE controller buffers
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=251
CONFIG_BT_L2CAP_TX_BUF_COUNT=8

	# Controller event length (more time per connection event)
CONFIG_BT_CTLR_SDC_MAX_CONN_EVENT_LEN_DEFAULT=7500

	# -----------------------------------------------------------------------------
	# POWER MANAGEMENT (Aggressive wake-up)
	# -----------------------------------------------------------------------------
	# Idle timeout before entering low-power mode (15 minutes)
CONFIG_ZMK_IDLE_TIMEOUT=900000

	# Disable USB logging to reduce power and potential interference
CONFIG_ZMK_USB_LOGGING=n

	# -----------------------------------------------------------------------------
	# KEYBOARD SCAN SETTINGS (Debounce tuning)
	# -----------------------------------------------------------------------------
	# Your current debounce is 10ms - this is fine, but you can try:
	# CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
	# CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

	# -----------------------------------------------------------------------------
	# SPLIT KEYBOARD CORE
	# -----------------------------------------------------------------------------
CONFIG_ZMK_SPLIT=y

	# -----------------------------------------------------------------------------
	# BEHAVIORS (From your original config)
	# -----------------------------------------------------------------------------
CONFIG_ZMK_BEHAVIOR_TAP_DANCE=y
CONFIG_ZMK_BEHAVIOR_HOLD_TAP=y

	# -----------------------------------------------------------------------------
	# STUDIO (Uncomment if you use ZMK Studio)
	# -----------------------------------------------------------------------------
	# CONFIG_ZMK_STUDIO=y

	# =============================================================================
	# TROUBLESHOOTING NOTES:
	# 
	# If you still experience issues after applying this config:
	# 
	# 1. RESET BOTH HALVES:
	#    - Press reset button twice quickly on each half
	#    - Clear all BLE bonds on your computer
	#    - Re-pair from scratch
	# 
	# 2. CHECK INTERFERENCE:
	#    - Move away from WiFi routers, USB 3.0 devices
	#    - Try different desk location
	# 
	# 3. VERIFY FIRMWARE:
	#    - Ensure both halves have the SAME firmware build
	#    - Flash both halves at the same time
	# 
	# 4. MONITOR BATTERY:
	#    - Low battery (<20%) can cause instability
	#    - Charge both halves fully
	# 
	# 5. IF ISSUES PERSIST:
	#    - Consider TRRS cable between halves (best reliability)
	#    - Or try different hardware (Seeed XIAO BLE)
	# =============================================================================
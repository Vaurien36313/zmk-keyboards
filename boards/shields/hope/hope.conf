CONFIG_ZMK_SLEEP=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# Supervision timeout in units of 10ms. 600 = 6s (was 4s) — tolerates brief RF interference
# before declaring a disconnect. Must stay > 2 * max_int (24 units min), so 600 is safe.
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=2
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=20
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=2048
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_QUEUE_SIZE=20
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=2048
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_PRIORITY=5
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_CTLR_SDC_MAX_CONN_EVENT_LEN_DEFAULT=7500
# Idle timeout in ms. 86400000 = 24h — prevents ZMK from entering idle mode during normal
# inactivity. Idle mode can trigger BLE power-saving parameter renegotiation which causes drops.
CONFIG_ZMK_IDLE_TIMEOUT=86400000
CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BEHAVIOR_TAP_DANCE=y
CONFIG_ZMK_BEHAVIOR_HOLD_TAP=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Prevent the host OS from renegotiating connection parameters (e.g. longer interval for
# power saving) during idle. Keeps our preferred 7.5–15ms interval locked in at all times.
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
# Extra BT buffers — reduces packet drops during reconnection burst, smooths the lag spike
CONFIG_BT_CTLR_RX_BUFFERS=10
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251